services:
  php:
    image: ${DOCKER_PHP_BUILT_IMAGE:-${COMPOSE_PROJECT_NAME}-php}
    pull_policy: ${PHP_IMAGE_PULL_POLICY:-build}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_IMAGE: ${PHP_IMAGE:-php:8.3-cli}
    user: '${USERID:-1000}:${GROUPID:-1000}'
    volumes:
      - './:/var/am-driver'
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    working_dir: ${WORKING_DIR:-/var/am-driver}
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    networks:
      - am-driver-network

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    restart: on-failure
    environment:
      PORT: 8080
      SUPPORTED_SUBMIT_METHODS: "['post']"
      SWAGGER_JSON: /openapi/receptacle-v1.yaml
    volumes:
      - ./docs/openapi:/openapi:ro
    ports:
      - '${HOST_IP:-127.0.0.1}:${AM_DRIVER_SWAGGER_PORT:-18098}:8080'

networks:
  am-driver-network:
    name: '${COMPOSE_PROJECT_NAME}-network'
    driver: bridge
